name: Sync paper files to cosmo-numba

on:
  workflow_run:
    workflows: ["Draft PDF"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout paper repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy paper files to cosmo-numba
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          API_TOKEN_GITHUB: ${{ secrets.COSMO_NUMBA_SYNC_TOKEN }}
        with:
          source-directory: paper
          destination-github-username: aguinot
          destination-repository-name: cosmo-numba
          target-directory: .
          target-branch: main
          commit-message: |
            sync: update paper files from cosmo-numba-Bmodes-paper@${{ github.event.workflow_run.head_sha }}
