name: Sync paper files to cosmo-numba

on:
  workflow_run:
    workflows: ["Draft PDF"]
    types:
      - completed
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout paper repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout cosmo-numba
        uses: actions/checkout@v4
        with:
          repository: aguinot/cosmo-numba
          token: ${{ secrets.COSMO_NUMBA_SYNC_TOKEN }}
          path: cosmo-numba

      - name: Copy paper files to cosmo-numba root
        run: cp -r paper cosmo-numba/

      - name: Commit and push to cosmo-numba
        working-directory: cosmo-numba
        env:
          GH_TOKEN: ${{ secrets.COSMO_NUMBA_SYNC_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "sync: update paper files from cosmo-numba-Bmodes-paper@${{ github.event.workflow_run.head_sha }} [skip ci]"
          git push
