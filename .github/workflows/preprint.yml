name: Preprint TeX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate preprint TeX via inara (Docker)
        shell: bash
        run: |
          set -euo pipefail

          # Run inara to generate the preprint TeX from paper/paper.md
          docker run --rm \
            -v "$PWD":/data \
            -u "$(id -u):$(id -g)" \
            openjournals/inara \
            -o preprint paper/paper.md

          # inara typically writes: paper/paper.preprint.tex
          if [ ! -f paper/paper.preprint.tex ]; then
            echo "Expected output paper/paper.preprint.tex not found."
            echo "Contents of paper/:"
            ls -la paper || true
            exit 1
          fi

          mv paper/paper.preprint.tex paper/paper.tex

      - name: Commit TeX to repository
        uses: EndBug/add-and-commit@v9
        with:
          message: '(auto) Paper TeX Preprint'
          add: 'paper/paper.tex'
