name: Preprint TeX

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate preprint TeX
        uses: xuanxu/preprint-action@main
        with:
          repository_url: https://github.com/${{ github.repository }}
          branch: ${{ github.ref_name }}
          issue_id: ${{ github.run_id }}
          journal: joss

      - name: Move preprint into paper/ as paper.tex
        shell: bash
        run: |
          set -euo pipefail
          # preprint-action renames the output to: paper/joss-${issue_id}.preprint.tex
          SRC="paper/joss-${{ github.run_id }}.preprint.tex"
          if [ ! -f "$SRC" ]; then
            echo "Expected preprint file not found at $SRC"
            echo "Contents of paper/:"
            ls -la paper || true
            exit 1
          fi
          mv "$SRC" paper/paper.tex

      - name: Commit TeX to repository
        uses: EndBug/add-and-commit@v9
        with:
          message: '(auto) Paper TeX Preprint'
          add: 'paper/paper.tex'
